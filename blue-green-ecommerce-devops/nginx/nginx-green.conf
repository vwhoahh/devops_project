# =============================================================
#  NGINX Configuration – GREEN Environment (Phase 6)
#  This config routes 100% of traffic to the GREEN container.
#  Used by: scripts/switch_to_green.ps1
#
#  To apply: run .\scripts\switch_to_green.ps1
# =============================================================

events {
    worker_connections 1024;
}

http {

    upstream blue_backend {
        server blue-app:5000;
    }

    upstream green_backend {
        server green-app:5000;
    }

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream="$upstream_addr"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    server {
        listen 80;
        server_name localhost;

        location /health {
            access_log off;
            return 200 "NGINX → GREEN (Version 2) is healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            # ✅ ACTIVE: GREEN (Version 2)
            proxy_pass http://green_backend;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
            proxy_buffering    on;
            proxy_buffer_size  4k;
            proxy_buffers      8 4k;
        }
    }
}
