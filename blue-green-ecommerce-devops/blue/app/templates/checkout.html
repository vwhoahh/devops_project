{% extends "base.html" %}

{% block content %}
<div style="display: flex; gap: 20px; margin-top: 20px;">
  <div style="flex: 1;">
    <div style="background-color: var(--white); box-shadow: 0 1px 2px 0 rgba(0,0,0,.1); margin-bottom: 16px;">
      <div style="background-color: var(--primary); color: white; padding: 16px 24px; font-size: 16px; font-weight: 500;">
        <span style="background-color: #fff; color: var(--primary); width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; border-radius: 4px; margin-right: 12px; font-size: 12px;">1</span>
        LOGIN OR SIGNUP
      </div>
      <div style="padding: 24px; text-align: center;">
        <input type="text" placeholder="Enter Email/Mobile number" style="width: 300px; padding: 10px; border: 1px solid var(--border-color); outline: none;">
        <button style="background: #fb641b; color: #fff; border: none; padding: 12px 40px; margin-left: 10px; font-weight: 500; cursor: pointer;">CONTINUE</button>
      </div>
    </div>
    
    <div style="background-color: var(--white); box-shadow: 0 1px 2px 0 rgba(0,0,0,.1); padding: 16px 24px; margin-bottom: 16px; color: var(--text-muted); font-weight: 500;">
      <span style="background-color: #f0f0f0; color: var(--text-muted); width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; border-radius: 4px; margin-right: 12px; font-size: 12px;">2</span>
      DELIVERY ADDRESS
    </div>
    <div style="background-color: var(--white); box-shadow: 0 1px 2px 0 rgba(0,0,0,.1); padding: 16px 24px; margin-bottom: 16px; color: var(--text-muted); font-weight: 500;">
      <span style="background-color: #f0f0f0; color: var(--text-muted); width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; border-radius: 4px; margin-right: 12px; font-size: 12px;">3</span>
      ORDER SUMMARY
    </div>
    <div style="background-color: var(--white); box-shadow: 0 1px 2px 0 rgba(0,0,0,.1); padding: 16px 24px; margin-bottom: 16px; color: var(--text-muted); font-weight: 500;">
      <span style="background-color: #f0f0f0; color: var(--text-muted); width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; border-radius: 4px; margin-right: 12px; font-size: 12px;">4</span>
      PAYMENT OPTIONS
    </div>
  </div>
  
  <div style="width: 300px;">
    <div style="background-color: var(--white); box-shadow: 0 1px 2px 0 rgba(0,0,0,.1); padding: 16px;">
      <h3 style="font-size: 16px; font-weight: 500; color: var(--text-muted); border-bottom: 1px solid var(--border-color); padding-bottom: 12px; margin-bottom: 16px;">PRICE DETAILS</h3>
      <div style="display: flex; justify-content: space-between; margin-bottom: 16px; font-size: 14px;">
        <span>Price (1 item)</span>
        <span>₹55,000</span>
      </div>
      <div style="display: flex; justify-content: space-between; margin-bottom: 16px; font-size: 14px;">
        <span>Delivery Charges</span>
        <span style="color: var(--offer-green);">FREE</span>
      </div>
      <div style="display: flex; justify-content: space-between; font-weight: 500; font-size: 16px; border-top: 1px dashed var(--border-color); border-bottom: 1px dashed var(--border-color); padding: 16px 0; margin-bottom: 16px;">
        <span>Total Payable</span>
        <span>₹55,000</span>
      </div>
      <div style="color: var(--offer-green); font-size: 14px; font-weight: 500;">
        You will save ₹5,000 on this order
      </div>
    </div>
  </div>
</div>
{% endblock %}
